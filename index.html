<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROC D'AZUR 2026 — Saisie Bénévoles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');

  :root {
    --rouge: #C0392B;
    --rouge-vif: #E74C3C;
    --orange: #E67E22;
    --dark: #1A1A2E;
    --dark2: #16213E;
    --dark3: #0F3460;
    --gris: #2C3E50;
    --gris2: #34495E;
    --texte: #ECF0F1;
    --texte2: #BDC3C7;
    --vert: #27AE60;
    --bleu: #2980B9;
    --jaune: #F39C12;
    --border: rgba(255,255,255,0.08);
    --input-bg: rgba(255,255,255,0.06);
    --input-focus: rgba(192,57,43,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--texte);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ========= HEADER ========= */
  header {
    background: linear-gradient(135deg, var(--dark2) 0%, var(--dark3) 100%);
    border-bottom: 3px solid var(--rouge);
    padding: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    gap: 16px;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900; letter-spacing: 1px;
    color: var(--texte);
    white-space: nowrap;
  }
  .header-title span { color: var(--rouge-vif); }
  .header-controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .jour-selector {
    display: flex; gap: 4px;
  }
  .btn-jour {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    padding: 6px 12px; border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--input-bg); color: var(--texte2);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-jour:hover { background: var(--gris2); color: var(--texte); }
  .btn-jour.active {
    background: var(--rouge); border-color: var(--rouge-vif);
    color: #fff; box-shadow: 0 0 12px rgba(231,76,60,0.4);
  }
  .btn-action {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    padding: 7px 14px; border-radius: 4px; border: none;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-report { background: var(--bleu); color: #fff; }
  .btn-report:hover { background: #3498DB; }
  .btn-pdf { background: var(--rouge); color: #fff; }
  .btn-pdf:hover { background: var(--rouge-vif); }
  .btn-add-secteur { background: var(--vert); color: #fff; }
  .btn-add-secteur:hover { background: #2ECC71; }
  .badge-conflicts {
    background: var(--orange); color: #fff;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px;
    padding: 4px 10px; border-radius: 20px; display: none;
  }

  /* ========= MAIN LAYOUT ========= */
  main {
    padding: 16px 20px;
    max-width: 1600px; margin: 0 auto;
  }

  /* ========= DATE BAR ========= */
  .date-bar {
    background: linear-gradient(90deg, var(--dark3) 0%, var(--dark2) 100%);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .date-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    color: var(--rouge-vif); text-transform: uppercase;
  }
  .stats-bar {
    display: flex; gap: 20px;
    font-size: 12px; color: var(--texte2);
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-dot.rouge { background: var(--rouge-vif); }
  .stat-dot.vert { background: var(--vert); }
  .stat-dot.jaune { background: var(--jaune); }
  .stat-val { font-weight: 600; color: var(--texte); }

  /* ========= SECTEUR BLOC ========= */
  .secteur-bloc {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .secteur-bloc:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

  .secteur-header {
    background: linear-gradient(90deg, rgba(192,57,43,0.2) 0%, rgba(15,52,96,0.4) 100%);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none;
  }
  .secteur-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 900;
    color: var(--rouge-vif); min-width: 32px;
    line-height: 1;
  }
  .secteur-name-select {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    background: transparent; border: none; color: var(--texte);
    cursor: pointer;
    padding: 2px 6px; border-radius: 4px;
    transition: background 0.15s;
    -webkit-appearance: none;
    background-image: none;
  }
  .secteur-name-select:hover { background: rgba(255,255,255,0.08); }
  .secteur-name-select option { background: var(--dark2); font-size: 14px; font-weight: 400; }

  .secteur-meta {
    display: flex; align-items: center; gap: 16px; flex: 1;
    flex-wrap: wrap;
  }
  .meta-field {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--texte2);
  }
  .meta-field label { white-space: nowrap; font-weight: 500; }
  .meta-select, .meta-input {
    background: #f0f0f0; border: 1px solid #bbb;
    color: #111; border-radius: 4px; padding: 4px 8px;
    font-family: 'Barlow', sans-serif; font-size: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .meta-select:focus, .meta-input:focus {
    outline: none; border-color: var(--rouge);
    background: var(--input-focus);
  }
  .meta-select { width: 150px; }
  .meta-input { width: 65px; }
  .meta-tel {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; color: var(--jaune); font-weight: 600;
    min-width: 110px;
  }

  .secteur-actions {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .btn-sm {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--texte2); cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--gris); color: var(--texte); }
  .btn-sm.danger:hover { background: #922B21; border-color: var(--rouge); color: #fff; }
  .btn-sm.success { background: rgba(39,174,96,0.15); border-color: var(--vert); color: var(--vert); }
  .btn-sm.success:hover { background: var(--vert); color: #fff; }
  .toggle-icon {
    font-size: 16px; color: var(--texte2); transition: transform 0.2s;
  }
  .secteur-bloc.collapsed .toggle-icon { transform: rotate(-90deg); }

  /* ========= TABLE PS ========= */
  .table-wrapper {
    overflow-x: auto;
    padding: 0 0 4px 0;
  }
  .secteur-bloc.collapsed .table-wrapper { display: none; }

  table.ps-table {
    width: 100%; border-collapse: collapse;
    min-width: 900px;
  }
  .ps-table thead th {
    background: rgba(0,0,0,0.3);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    color: var(--texte2); text-transform: uppercase;
    padding: 7px 10px; text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ps-table thead th.col-radios { text-align: center; }
  .ps-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .ps-table tbody tr:hover { background: rgba(255,255,255,0.03); }
  .ps-table tbody tr.ps-row-dirty { background: rgba(192,57,43,0.06); }
  .ps-table td {
    padding: 5px 6px; vertical-align: middle;
  }
  .ps-table td.col-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--texte2);
    padding-left: 14px; min-width: 28px;
  }

  /* inputs dans table */
  .ps-table input[type=text], .ps-table select {
    width: 100%; background: var(--input-bg);
    border: 1px solid transparent; border-radius: 4px;
    color: var(--texte); padding: 5px 7px;
    font-family: 'Barlow', sans-serif; font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
  }
  .ps-table input[type=text]:focus, .ps-table select:focus {
    outline: none; border-color: var(--rouge);
    background: var(--input-focus);
  }
  .ps-table select option { background: var(--dark2); }
  .ps-table input[type=text]::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }

  .col-ps { min-width: 200px; }
  .col-hmep { width: 80px; }
  .col-veh { width: 110px; }
  .col-benv { min-width: 130px; }
  .col-radio { width: 52px; text-align: center; }
  .col-obs { min-width: 140px; }
  .col-del { width: 32px; text-align: center; }

  /* radio number input */
  .radio-num {
    width: 44px; height: 30px; text-align: center;
    background: var(--input-bg); border: 1px solid transparent;
    border-radius: 4px; color: var(--texte);
    font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; -moz-appearance: textfield;
    transition: border-color 0.15s, background 0.15s;
    display: block; margin: 0 auto;
  }
  .radio-num::-webkit-inner-spin-button,
  .radio-num::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .radio-num:focus { outline: none; border-color: var(--rouge); background: var(--input-focus); }
  .radio-num.has-value { color: var(--vert); border-color: rgba(39,174,96,0.4); }
  .radio-num.com.has-value { color: #7EC8E3; border-color: rgba(41,128,185,0.4); }
  .radio-num.crs.has-value { color: #F1948A; border-color: rgba(192,57,43,0.4); }
  .radio-num.cmv.has-value { color: #82E0AA; border-color: rgba(39,174,96,0.4); }

  /* row-ajouter */
  .btn-add-ps {
    width: 100%; padding: 7px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    background: transparent; border: 1px dashed rgba(255,255,255,0.12);
    color: var(--texte2); cursor: pointer; transition: all 0.15s;
    border-radius: 0 0 6px 6px;
  }
  .btn-add-ps:hover {
    background: rgba(39,174,96,0.1); border-color: var(--vert); color: var(--vert);
  }

  .btn-del-row {
    background: none; border: none; color: rgba(255,255,255,0.15);
    cursor: pointer; font-size: 15px; padding: 4px; border-radius: 3px;
    transition: all 0.15s; display: block; margin: 0 auto;
  }
  .btn-del-row:hover { background: rgba(192,57,43,0.3); color: var(--rouge-vif); }

  /* conflict highlight */
  .conflict-cell input, .conflict-cell select {
    border-color: var(--orange) !important;
    background: rgba(230,126,34,0.12) !important;
  }
  .conflict-veh input, .conflict-veh select {
    border-color: #E74C3C !important;
    background: rgba(192,57,43,0.18) !important;
  }
  .conflict-badge {
    font-size: 10px; background: var(--orange); color: #fff;
    border-radius: 3px; padding: 1px 4px; margin-left: 4px;
    vertical-align: middle; display: none;
  }
  .conflict-badge.visible { display: inline; }

  /* ========= RADIO STAT PILLS (date-bar) ========= */
  .radio-stat-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 8px; border-radius: 4px; border: 1px solid;
    transition: all 0.2s;
  }
  .radio-stat-pill.com { background: rgba(41,128,185,0.15); border-color: rgba(88,166,255,0.3); color: #7EC8E3; }
  .radio-stat-pill.crs { background: rgba(192,57,43,0.15); border-color: rgba(231,76,60,0.3); color: #F1948A; }
  .radio-stat-pill.cmv { background: rgba(39,174,96,0.15); border-color: rgba(63,185,80,0.3); color: #82E0AA; }
  .radio-stat-pill.over { background: rgba(231,76,60,0.3); border-color: var(--rouge-vif); color: #fff; animation: pulse-warn 1s infinite; }
  @keyframes pulse-warn { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

  /* ========= ALERTS BAR ========= */
  #alertsBar { margin: 0 0 10px 0; display: flex; flex-direction: column; gap: 5px; }
  .alert-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; border-radius: 7px; font-size: 13px;
    border: 1px solid;
  }
  .alert-item.radio-over {
    background: rgba(192,57,43,0.12); border-color: rgba(231,76,60,0.4); color: #F1948A;
  }
  .alert-item.veh-double {
    background: rgba(230,126,34,0.12); border-color: rgba(230,126,34,0.4); color: var(--orange);
  }
  .alert-icon { font-size: 15px; flex-shrink: 0; }
  .alert-text strong { color: #fff; }

  /* ========= COMMENTAIRES SECTEUR ========= */
  .secteur-commentaires {
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
    padding: 10px 16px 12px;
  }
  .secteur-bloc.collapsed .secteur-commentaires { display: none; }
  .commentaires-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    color: var(--texte2); text-transform: uppercase;
    margin-bottom: 7px;
  }
  .commentaires-grid {
    display: flex; flex-direction: column; gap: 5px;
  }
  .comment-row {
    display: flex; align-items: center; gap: 8px;
  }
  .comment-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; color: var(--texte2); min-width: 18px; text-align: right;
  }
  .comment-input {
    flex: 1; background: var(--input-bg); border: 1px solid transparent;
    border-radius: 4px; color: var(--texte); padding: 5px 10px;
    font-family: 'Barlow', sans-serif; font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
  }
  .comment-input:focus {
    outline: none; border-color: var(--jaune);
    background: rgba(243,156,18,0.08);
  }
  .comment-input::placeholder { color: rgba(255,255,255,0.18); font-style: italic; }
  .comment-input.has-value { border-color: rgba(243,156,18,0.3); color: var(--jaune); }

  /* ========= PANEL REPORT ========= */
  .report-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .report-overlay.active { display: flex; }
  .report-panel {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 12px; width: 100%; max-width: 820px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .report-header {
    background: linear-gradient(90deg, var(--rouge) 0%, var(--dark3) 100%);
    padding: 16px 20px; border-radius: 12px 12px 0 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .report-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900; letter-spacing: 1.5px;
  }
  .btn-close {
    background: rgba(0,0,0,0.3); border: none; color: #fff;
    border-radius: 50%; width: 32px; height: 32px; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .report-body { padding: 20px; }
  .report-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .report-table th {
    background: rgba(0,0,0,0.3); padding: 8px 10px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    letter-spacing: 0.8px; text-transform: uppercase; color: var(--texte2);
    text-align: left; border-bottom: 1px solid var(--border);
  }
  .report-table td {
    padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: top;
  }
  .report-table tr:hover td { background: rgba(255,255,255,0.03); }
  .radio-pill {
    display: inline-block; font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 6px; border-radius: 3px; margin: 1px;
  }
  .radio-pill.com { background: rgba(41,128,185,0.3); color: #7EC8E3; }
  .radio-pill.crs { background: rgba(192,57,43,0.3); color: #F1948A; }
  .radio-pill.cmv { background: rgba(39,174,96,0.3); color: #82E0AA; }
  .btn-print {
    background: var(--rouge); color: #fff;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 14px; padding: 10px 24px; border: none;
    border-radius: 6px; cursor: pointer; margin-top: 16px;
    transition: background 0.15s;
  }
  .btn-print:hover { background: var(--rouge-vif); }

  /* ========= TOAST ========= */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--vert); color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
    padding: 12px 20px; border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s; z-index: 300;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.warn { background: var(--orange); }
  .toast.err { background: var(--rouge); }

  .col-course { min-width: 130px; }
  .course-pill {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
    padding: 2px 7px; border-radius: 3px; margin: 1px 2px;
    white-space: nowrap;
  }
  .course-none { color: rgba(255,255,255,0.18); font-size: 11px; font-style: italic; }

  /* ========= COURSES PANEL ========= */
  .courses-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .courses-overlay.active { display: flex; }
  .courses-panel {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 12px; width: 100%; max-width: 680px;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .courses-panel-header {
    background: linear-gradient(90deg, #6C3483 0%, var(--dark3) 100%);
    padding: 14px 20px; border-radius: 12px 12px 0 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .courses-panel-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 900; letter-spacing: 1.5px;
  }
  .courses-panel-body { padding: 16px 20px; }
  .course-card {
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 14px; overflow: hidden;
  }
  .course-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px;
    letter-spacing: 0.8px;
  }
  .course-jours {
    display: flex; gap: 6px;
  }
  .course-jour-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    background: rgba(255,255,255,0.15); color: var(--texte);
  }
  .course-jour-badge.active-jour {
    background: var(--rouge); color: #fff;
    box-shadow: 0 0 8px rgba(231,76,60,0.4);
  }
  .course-ps-list {
    padding: 8px 14px 12px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .course-ps-item {
    font-size: 12px; background: var(--input-bg);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 8px; color: var(--texte2);
  }
  .course-ps-item.assigned {
    border-color: var(--vert); color: var(--vert);
    background: rgba(39,174,96,0.1);
  }
  .course-ps-item.assigned::before { content: '✓ '; }
  .course-summary {
    padding: 6px 14px 10px;
    font-size: 12px; color: var(--texte2);
    border-top: 1px solid var(--border);
  }
  .course-summary strong { color: var(--texte); }
  @media print {
    /* Par défaut : tout masqué sauf contenu normal */
    header, .date-bar, .stats-bar, .secteur-actions,
    .btn-add-ps, .btn-del-row, .courses-overlay { display: none !important; }
    #reportOverlay, #ficheSectOverlay { display: none !important; }
    body { background: #fff; color: #000; }
    .secteur-header { background: #eee; }

function buildSelect(options, selected, placeholder, cls) {
  let html = `<select class="${cls}"><option value="">${placeholder}</option>`;
  options.forEach(o => {
    const val = typeof o === 'object' ? o.nom : o;
    html += `<option value="${val}" ${val === selected ? 'selected' : ''}>${val}</option>`;
  });
  html += '</select>';
  return html;
}

function buildPSOptions(secteur, selected) {
  const list = PS_SECTEUR[secteur] || [];
  let html = `<select class="ps-select" style="width:100%"><option value="">— choisir PS —</option>`;
  list.forEach(ps => {
    html += `<option value="${ps}" ${ps === selected ? 'selected' : ''}>${ps}</option>`;
  });
  html += `<option value="${selected}" ${selected && !list.includes(selected) ? 'selected' : ''}>${selected && !list.includes(selected) ? selected : ''}</option>`;
  // allow free text fallback
  html += '</select>';
  return html;
}

function renderPSRow(si, ri, row, secteur) {
  const benvOpts = (val) => `<option value="">—</option>` + BENEVOLES.map(b =>
    `<option value="${b}" ${b === val ? 'selected' : ''}>${b}</option>`
  ).join('');
  const vehOpts = (val) => `<option value="">—</option>` + VEHICULES.map(v =>
    `<option value="${v}" ${v === val ? 'selected' : ''}>${v}</option>`
  ).join('');
  const heureOpts = (val) => `<option value="">—</option>` + HEURES_MEP.map(h =>
    `<option value="${h}" ${h === val ? 'selected' : ''}>${h}</option>`
  ).join('');

  // PS select
  const psList = PS_SECTEUR[secteur] || [];
  let psOpts = `<option value="">— choisir PS —</option>` + psList.map(ps =>
    `<option value="${ps}" ${ps === row.ps ? 'selected' : ''}>${ps}</option>`
  ).join('');
  if (row.ps && !psList.includes(row.ps)) {
    psOpts += `<option value="${row.ps}" selected>${row.ps}</option>`;
  }

  return `
    <tr id="row-${si}-${ri}" data-si="${si}" data-ri="${ri}">
      <td class="col-num">${ri + 1}</td>
      <td class="col-ps">
        <select onchange="updateRow(${si},${ri},'ps',this.value); refreshCoursePills(${si},${ri},this.value);" class="ps-select">
          ${psOpts}
        </select>
      </td>
      <td class="col-hmep">
        <select onchange="updateRow(${si},${ri},'hmep',this.value)">
          ${heureOpts(row.hmep)}
        </select>
      </td>
      <td class="col-veh">
        <select onchange="updateRow(${si},${ri},'vehA',this.value)">
          ${vehOpts(row.vehA)}
        </select>
      </td>
      <td class="col-veh">
        <select onchange="updateRow(${si},${ri},'vehB',this.value)">
          ${vehOpts(row.vehB)}
        </select>
      </td>
      <td class="col-benv" id="benv-${si}-${ri}-1">
        <select onchange="updateRow(${si},${ri},'b1',this.value)">
          ${benvOpts(row.b1)}
        </select>
      </td>
      <td class="col-benv" id="benv-${si}-${ri}-2">
        <select onchange="updateRow(${si},${ri},'b2',this.value)">
          ${benvOpts(row.b2)}
        </select>
      </td>
      <td class="col-benv" id="benv-${si}-${ri}-3">
        <select onchange="updateRow(${si},${ri},'b3',this.value)">
          ${benvOpts(row.b3)}
        </select>
      </td>
      <td class="col-radio">
        <input type="number" class="radio-num com ${(row.com||0)>0?'has-value':''}" min="0" max="9"
          value="${(row.com||0)>0 ? row.com : ''}" placeholder="0" title="Nb radios COM"
          onchange="updateRow(${si},${ri},'com',+this.value||0); this.classList.toggle('has-value',+this.value>0)">
      </td>
      <td class="col-radio">
        <input type="number" class="radio-num crs ${(row.crs||0)>0?'has-value':''}" min="0" max="9"
          value="${(row.crs||0)>0 ? row.crs : ''}" placeholder="0" title="Nb radios CRS"
          onchange="updateRow(${si},${ri},'crs',+this.value||0); this.classList.toggle('has-value',+this.value>0)">
      </td>
      <td class="col-radio">
        <input type="number" class="radio-num cmv ${(row.cmv||0)>0?'has-value':''}" min="0" max="9"
          value="${(row.cmv||0)>0 ? row.cmv : ''}" placeholder="0" title="Nb radios CMV"
          onchange="updateRow(${si},${ri},'cmv',+this.value||0); this.classList.toggle('has-value',+this.value>0)">
      </td>
      <td class="col-obs">
        <input type="text" placeholder="Obs…" value="${row.obs || ''}"
          oninput="updateRow(${si},${ri},'obs',this.value)">

      </td>
    </tr>
  `;
}

// ========================================================
// ACTIONS
// ========================================================
function switchJour(jid) {
  currentJour = jid;
  renderAll();
}

function addSecteur() {
  state[currentJour].push({
    secteur: SECTEURS[0], referant: '', hmepSect: '6h00', collapsed: false,
    commentaires: ['','',''],
    rows: [emptyRow()]
  });
  renderAll();
  // scroll to bottom
  setTimeout(() => {
    const last = document.getElementById(`sect-${state[currentJour].length - 1}`);
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function removeSecteur(si) {
  if (state[currentJour].length <= 1) { toast('Au moins 1 secteur requis', 'warn'); return; }
  if (confirm(`Supprimer le secteur ${state[currentJour][si].secteur} ?`)) {
    state[currentJour].splice(si, 1);
    renderAll();
  }
}

function toggleCollapse(si, e) {
  state[currentJour][si].collapsed = !state[currentJour][si].collapsed;
  const bloc = document.getElementById(`sect-${si}`);
  bloc.classList.toggle('collapsed');
}

function changeSecteur(si, val) {
  state[currentJour][si].secteur = val;
  // update commentaires label
  const lbl = document.getElementById(`comm-label-${si}`);
  if (lbl) lbl.innerHTML = `📝 Commentaires pour le référant <strong>${val}</strong>`;
  // re-render only that secteur's rows to update PS dropdowns
  const tbody = document.getElementById(`rows-${si}`);
  tbody.innerHTML = state[currentJour][si].rows.map((r, ri) =>
    renderPSRow(si, ri, r, val)
  ).join('');
  checkConflicts();
}

function changeReferant(si, val) {
  state[currentJour][si].referant = val;
  const refObj = REFERANTS.find(r => r.nom === val);
  document.getElementById(`tel-${si}`).textContent = refObj ? '📞 ' + refObj.tel : '';
}

function changeHmepSect(si, val) {
  state[currentJour][si].hmepSect = val;
}

function addPS(si) {
  state[currentJour][si].rows.push(emptyRow());
  const ri = state[currentJour][si].rows.length - 1;
  const tbody = document.getElementById(`rows-${si}`);
  tbody.insertAdjacentHTML('beforeend',
    renderPSRow(si, ri, state[currentJour][si].rows[ri], state[currentJour][si].secteur)
  );
  updateStats();
}

function deleteRow(si, ri) {
  const rows = state[currentJour][si].rows;
  if (rows.length <= 1) { toast('Au moins 1 ligne par secteur', 'warn'); return; }
  rows.splice(ri, 1);
  // re-render rows for this secteur
  const tbody = document.getElementById(`rows-${si}`);
  tbody.innerHTML = rows.map((r, ri2) =>
    renderPSRow(si, ri2, r, state[currentJour][si].secteur)
  ).join('');
  updateStats();
  checkConflicts();
}

function updateRow(si, ri, field, val) {
  state[currentJour][si].rows[ri][field] = val;
  updateStats();
  checkConflicts();
}

function updateCommentaire(si, ci, val) {
  if (!state[currentJour][si].commentaires) state[currentJour][si].commentaires = ['','',''];
  state[currentJour][si].commentaires[ci] = val;
}

function emptyRow() {
  return { ps:'', hmep:'', vehA:'', vehB:'', b1:'', b2:'', b3:'', b4:'', b5:'',
           com:0, crs:0, cmv:0, obs:'' };
}

// ========================================================
// STATS
// ========================================================
function updateStats() {
  const sects = state[currentJour] || [];
  let ps = 0, benv = 0, veh = new Set();
  sects.forEach(s => {
    s.rows.forEach(r => {
      if (r.ps) ps++;
      ['b1','b2','b3','b4','b5'].forEach(k => { if (r[k]) benv++; });
      if (r.vehA) veh.add(r.vehA);
      if (r.vehB) veh.add(r.vehB);
    });
  });
  document.getElementById('statPS').textContent = ps;
  document.getElementById('statBenv').textContent = benv;
  document.getElementById('statVeh').textContent = veh.size;
}

// ========================================================
// CONFLICT CHECK — bénévoles doublons + radios max + véhicules doublons
// ========================================================
const RADIO_MAX = { com: 20, crs: 15, cmv: 10 };

function checkConflicts() {
  const sects = state[currentJour] || [];
  const benvCount = {}, vehCount = {};
  let totalCOM = 0, totalCRS = 0, totalCMV = 0;

  sects.forEach(s => {
    s.rows.forEach(r => {
      ['b1','b2','b3','b4','b5'].forEach(k => {
        if (r[k]) benvCount[r[k]] = (benvCount[r[k]] || 0) + 1;
      });
      if (r.vehA) vehCount[r.vehA] = (vehCount[r.vehA] || 0) + 1;
      if (r.vehB) vehCount[r.vehB] = (vehCount[r.vehB] || 0) + 1;
      totalCOM += (r.com || 0);
      totalCRS += (r.crs || 0);
      totalCMV += (r.cmv || 0);
    });
  });

  // --- Bénévoles doublons (highlight cellule) ---
  let hasBenvConflict = false;
  document.querySelectorAll('.conflict-cell').forEach(el => el.classList.remove('conflict-cell'));
  sects.forEach((s, si) => {
    s.rows.forEach((r, ri) => {
      ['b1','b2','b3'].forEach((k, ki) => {
        if (r[k] && benvCount[r[k]] > 1) {
          const td = document.querySelector(`#benv-${si}-${ri}-${ki+1}`);
          if (td) { td.classList.add('conflict-cell'); hasBenvConflict = true; }
        }
      });
    });
  });
  const badge = document.getElementById('badgeConflicts');
  if (hasBenvConflict) {
    const dups = Object.entries(benvCount).filter(([,v]) => v > 1).map(([k]) => k);
    badge.style.display = 'inline';
    badge.textContent = `⚠ ${dups.length} conflit(s) bénévoles`;
  } else {
    badge.style.display = 'none';
  }

  // --- A5 : Radio totaux + pills ---
  const totals = { com: totalCOM, crs: totalCRS, cmv: totalCMV };
  const labels = { com: 'COM', crs: 'CRS', cmv: 'CMV' };
  const maxes  = { com: RADIO_MAX.com, crs: RADIO_MAX.crs, cmv: RADIO_MAX.cmv };
  ['com','crs','cmv'].forEach(t => {
    const el = document.getElementById(`stat${t.toUpperCase()}`);
    if (!el) return;
    el.textContent = `${labels[t]} ${totals[t]}/${maxes[t]}`;
    el.classList.toggle('over', totals[t] > maxes[t]);
  });

  // --- A6 : Véhicules doublons (highlight) ---
  document.querySelectorAll('.conflict-veh').forEach(el => el.classList.remove('conflict-veh'));
  sects.forEach((s, si) => {
    s.rows.forEach((r, ri) => {
      if (r.vehA && vehCount[r.vehA] > 1) {
        const row = document.getElementById(`row-${si}-${ri}`);
        if (row) { const cells = row.querySelectorAll('td'); if(cells[3]) cells[3].classList.add('conflict-veh'); }
      }
      if (r.vehB && vehCount[r.vehB] > 1) {
        const row = document.getElementById(`row-${si}-${ri}`);
        if (row) { const cells = row.querySelectorAll('td'); if(cells[4]) cells[4].classList.add('conflict-veh'); }
      }
    });
  });

  // --- Build alerts bar ---
  const alerts = [];

  // A5-2 : radio over-limit
  ['com','crs','cmv'].forEach(t => {
    if (totals[t] > maxes[t]) {
      alerts.push(`<div class="alert-item radio-over">
        <span class="alert-icon">📻</span>
        <span class="alert-text">Radios <strong>${labels[t]}</strong> : <strong>${totals[t]}</strong> attribuées — max autorisé : <strong>${maxes[t]}</strong> (dépassement de ${totals[t]-maxes[t]})</span>
      </div>`);
    }
  });

  // A6 : véhicules utilisés plus d'une fois
  Object.entries(vehCount).forEach(([veh, cnt]) => {
    if (cnt > 1) {
      alerts.push(`<div class="alert-item veh-double">
        <span class="alert-icon">🚗</span>
        <span class="alert-text">Véhicule <strong>${veh}</strong> utilisé <strong>${cnt}×</strong> sur ${JOURS.find(j=>j.id===currentJour)?.label} — vérifier l'affectation</span>
      </div>`);
    }
  });

  document.getElementById('alertsBar').innerHTML = alerts.join('');
}

function openFicheSecteur() {

  const selSect = document.getElementById('fsSecteurSelect');
  const selJour = document.getElementById('fsJourSelect');

  // Secteurs présents dans le state du jour courant + tous secteurs connus
  const secteursDispos = [...new Set([
    ...SECTEURS,
    ...(state[currentJour] || []).map(s => s.secteur)
  ])];
  selSect.innerHTML = secteursDispos.map(s =>
    `<option value="${s}">${s}</option>`
  ).join('');

  selJour.innerHTML = JOURS.map(j =>
    `<option value="${j.id}" ${j.id === currentJour ? 'selected' : ''}>${j.label} — ${j.date}</option>`
  ).join('');

  document.getElementById('ficheSectOverlay').classList.add('active');
  renderFicheSecteur();
}

function closeFicheSecteur() {

function imprimerReport() {

  document.body.classList.add('print-report');
  window.print();
  setTimeout(() => document.body.classList.remove('print-report'), 1000);
}

function renderFicheSecteur() {
  const secteurNom = document.getElementById('fsSecteurSelect').value;
  const jourId     = document.getElementById('fsJourSelect').value;
  const body       = document.getElementById('ficheSectBody');
  const jourInfo   = JOURS.find(j => j.id === jourId);

  // Trouver les données du secteur pour ce jour
  const sectData = (state[jourId] || []).find(s => s.secteur === secteurNom);

  if (!sectData) {
    body.innerHTML = `<div class="fs-empty">Aucune saisie pour le secteur <strong>${secteurNom}</strong> en ${jourId}.</div>`;
    return;
  }

  const rows = sectData.rows.filter(r => r.ps);
  const comms = (sectData.commentaires || []).filter(Boolean);

  // ── Totaux secteur ───────────────────────────────────────────────────────
  let totalCOM=0, totalCRS=0, totalCMV=0, totalBenv=0;
  const vehs = new Set();
  rows.forEach(r => {
    totalCOM += (r.com||0); totalCRS += (r.crs||0); totalCMV += (r.cmv||0);
    [r.b1,r.b2,r.b3,r.b4,r.b5].forEach(b => { if(b) totalBenv++; });
    if(r.vehA) vehs.add(r.vehA);
    if(r.vehB) vehs.add(r.vehB);
  });

  // ── Helper courses pour un PS ────────────────────────────────────────────
  function coursesForPS(psStr, jour) {
    const nums = (psStr||'').match(/\d+/g)?.map(Number) || [];
    return Object.entries(COURSES)
      .filter(([,c]) => Array.isArray(c.ps) && nums.some(n => c.ps.includes(n)))
      .map(([nom]) => nom);
  }

  // ── HTML ─────────────────────────────────────────────────────────────────
  let html = `
    <div class="fs-titre">SECTEUR ${secteurNom}</div>
    <div class="fs-sous-titre">
      ROC D'AZUR 2026 — ${jourInfo.date} (${jourId})
    </div>

    <!-- IDENTIFICATION -->
    <div class="fs-section">
      <div class="fs-section-header">📍 Identification</div>
      <div class="fs-section-body">
        <div class="fs-info-grid">
          <div class="fs-info-item">
            <div class="fs-info-label">Secteur</div>
            <div class="fs-info-val bleu">${secteurNom}</div>
          </div>
          <div class="fs-info-item">
            <div class="fs-info-label">Référant</div>
            <div class="fs-info-val">${sectData.referant || '—'}</div>
          </div>
          <div class="fs-info-item">
            <div class="fs-info-label">H MeP Secteur</div>
            <div class="fs-info-val rouge">${sectData.hmepSect || '—'}</div>
          </div>
          <div class="fs-info-item">
            <div class="fs-info-label">Jour</div>
            <div class="fs-info-val">${jourInfo.date}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- RECAP CHIFFRES -->
    <div class="fs-section">
      <div class="fs-section-header">📊 Récapitulatif</div>
      <div class="fs-section-body">
        <div class="fs-info-grid">
          <div class="fs-info-item">
            <div class="fs-info-label">PS actifs</div>
            <div class="fs-info-val rouge">${rows.length}</div>
          </div>
          <div class="fs-info-item">
            <div class="fs-info-label">Bénévoles</div>
            <div class="fs-info-val vert">${totalBenv}</div>
          </div>
          <div class="fs-info-item">
            <div class="fs-info-label">Véhicules</div>
            <div class="fs-info-val bleu">${vehs.size}</div>
          </div>
          <div class="fs-info-item">
            <div class="fs-info-label">Radios</div>
            <div class="fs-info-val" style="font-size:12px">
              ${totalCOM ? `<span style="color:#1A5276;font-weight:700">${totalCOM} COM</span> ` : ''}
              ${totalCRS ? `<span style="color:#922B21;font-weight:700">${totalCRS} CRS</span> ` : ''}
              ${totalCMV ? `<span style="color:#1E8449;font-weight:700">${totalCMV} CMV</span>` : ''}
              ${!totalCOM && !totalCRS && !totalCMV ? '—' : ''}
            </div>
          </div>
        </div>
      </div>
    </div>

    ${comms.length ? `
    <!-- COMMENTAIRES REFERANT -->
    <div class="fs-section">
      <div class="fs-section-header">📝 Commentaires pour le référant</div>
      <div class="fs-section-body">
        <ul class="fs-comm-list">
          ${comms.map(c => `<li>${c}</li>`).join('')}
        </ul>
      </div>
    </div>` : ''}

    <!-- POINTS SIGNALEURS -->
    <div class="fs-section">
      <div class="fs-section-header">🗺 Points Signaleurs (${rows.length})</div>
      <div class="fs-section-body" style="padding:0">`;

  if (rows.length === 0) {
    html += `<div class="fs-empty">Aucun PS saisi pour ce secteur ce jour.</div>`;
  } else {
    html += `
        <table class="fs-table">
          <thead>
            <tr>
              <th>PS / Lieu-dit</th>
              <th>H MeP</th>
              <th>Véh A</th>
              <th>Véh B</th>
              <th>Bénévoles</th>
              <th>Radios</th>
              <th>Course(s)</th>
              <th>Km Ravit.</th>
              <th>Km Atelier</th>
              <th>Observations</th>
            </tr>
          </thead>
          <tbody>`;

    rows.forEach(r => {
      const benvs = [r.b1,r.b2,r.b3,r.b4,r.b5].filter(Boolean).join('<br>');
      const radios = [
        r.com ? `<span class="fs-radio-pill com">${r.com} COM</span>` : '',
        r.crs ? `<span class="fs-radio-pill crs">${r.crs} CRS</span>` : '',
        r.cmv ? `<span class="fs-radio-pill cmv">${r.cmv} CMV</span>` : '',
      ].join('');
      const courses = coursesForPS(r.ps, jourId)
        .map(c => `<span class="fs-course-tag">${c}</span>`).join('');
      const kmRavit  = r.kmRavit  || '<span style="color:#ccc">—</span>';
      const kmAtelier = r.kmAtelier || '<span style="color:#ccc">—</span>';

      html += `
            <tr>
              <td><strong>${r.ps}</strong></td>
              <td><strong style="color:#C0392B">${r.hmep || '—'}</strong></td>
              <td>${r.vehA || '—'}</td>
              <td>${r.vehB || '—'}</td>
              <td>${benvs || '—'}</td>
              <td>${radios || '—'}</td>
              <td>${courses || '—'}</td>
              <td>${kmRavit}</td>
              <td>${kmAtelier}</td>
              <td style="font-size:11px;color:#555">${r.obs || ''}</td>
            </tr>`;
    });

    html += `</tbody></table>`;
  }

  html += `
      </div>
    </div>

    <!-- MISSIONS -->
    <div class="fs-section">
      <div class="fs-section-header">🚨 Missions & Urgences</div>
      <div class="fs-section-body" style="font-size:12px;color:#333;line-height:1.7">
        • Guider les coureurs sur le parcours<br>
        • Signaler les incidents sur le parcours<br>
        • <strong>En cas d'accident : contacter le PC ROC sur RADIO COURSE</strong>
      </div>
    </div>

    <button class="btn-fiche-print" onclick="imprimerFicheSecteur()">🖨 Imprimer cette fiche</button>
  `;

  body.innerHTML = html;
}


// ========================================================
// APPS SCRIPT — Connexion Google Sheets
// Remplacer l'URL après déploiement (étape 4 du guide)
// ========================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3-9qOcnRxX29beMLYWvaelrdwPK1eI4eGJKOfI4MUub0f99Bq1JTUHdtPYl4Qv432/exec';
const SHEETS_ENABLED  = APPS_SCRIPT_URL !== 'REMPLACER_PAR_URL_APPS_SCRIPT';

// ── Appel Apps Script via JSONP (contourne les limitations CORS/redirect) ──
function callAS(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      delete window[cbName];
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      resolve(data);
    };
    const qs = new URLSearchParams({ ...params, callback: cbName });
    const s  = document.createElement('script');
    s.src    = `${APPS_SCRIPT_URL}?${qs}`;
    s.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('Script error')); };
    document.head.appendChild(s);
    setTimeout(() => s.remove(), 20000);
  });
}

// Charge les référentiels depuis Sheets au démarrage
async function loadReferentiels() {
  if (!SHEETS_ENABLED) return;
  try {
    showLoadingBanner('Chargement des référentiels depuis Google Sheets…');
    const json = await callAS({ action: 'getReferentiels' });
    if (!json.ok) throw new Error(json.error);
    const d = json.data;

    // Mise à jour des listes dynamiques
    BENEVOLES.length = 0;
    d.benevoles.forEach(b => BENEVOLES.push(b.nom));

    // Référants : depuis REF_Referents (d.referants) si disponible, sinon depuis secteurs
    REFERANTS.length = 0;
    if (d.referants && d.referants.length) {
      d.referants.forEach(r => REFERANTS.push({ nom: r.nom, tel: r.tel || '' }));
    } else if (d.secteurs && d.secteurs.length) {
      const seen = new Set();
      d.secteurs.forEach(s => {
        if (s.referant && !seen.has(s.referant)) {
          seen.add(s.referant);
          REFERANTS.push({ nom: s.referant, tel: s.tel || '' });
        }
      });
    }

    if (d.ps && d.ps.length) {
      Object.keys(PS_SECTEUR).forEach(k => delete PS_SECTEUR[k]);
      d.ps.forEach(p => {
        if (!PS_SECTEUR[p.secteur]) PS_SECTEUR[p.secteur] = [];
        PS_SECTEUR[p.secteur].push(`${p.num} - ${p.lieudit}`);
      });
    }
    if (d.courses && d.courses.length) {
      Object.keys(COURSES).forEach(k => delete COURSES[k]);
      d.courses.forEach(c => {
        COURSES[c.nom] = { jours: c.jours, ps: c.ps, couleur: c.couleur };
      });
    }
    hideLoadingBanner();
    // Re-render complet pour que les listes déroulantes (référants, PS) soient à jour
    renderAll();
    toast('Référentiels chargés depuis Sheets ✓');
  } catch(e) {
    hideLoadingBanner();
    toast('Mode hors-ligne (Sheets inaccessible)', 'warn');
    console.warn('Sheets error:', e);
  }
}

// Charge la saisie existante d'un jour depuis Sheets
async function loadSaisieFromSheets(jour) {
  if (!SHEETS_ENABLED) return;
  try {
    showLoadingBanner(`Chargement saisie ${jour} depuis Google Sheets…`);
    const [jsonSaisie, jsonComm] = await Promise.all([
      callAS({ action: 'getSaisie', jour }),
      callAS({ action: 'getCommentaires', jour }),
    ]);
    hideLoadingBanner();
    if (!jsonSaisie.ok) {
      console.warn('getSaisie error:', jsonSaisie.error);
      return; // silencieux — pas d'erreur affichée si Sheets vide
    }
    if (jsonSaisie.data && jsonSaisie.data.length) {
      state[jour] = jsonSaisie.data.map(s => ({
        secteur:      s.secteur,
        referant:     s.referant,
        hmepSect:     s.hmepSect,
        collapsed:    false,
        commentaires: jsonComm.ok && jsonComm.data && jsonComm.data[s.secteur]
                        ? jsonComm.data[s.secteur] : ['','',''],
        rows:         s.rows.map(r => ({ ...r })),
      }));
      renderAll();
      toast(`Saisie ${jour} chargée depuis Sheets ✓`);
    } else {
      // Sheets vide pour ce jour — normal, pas d'erreur
      console.log(`Sheets : aucune saisie pour ${jour}`);
    }
  } catch(e) {
    hideLoadingBanner();
    console.warn('Sheets load error:', e); // silencieux — on garde le localStorage
  }
}

// Sauvegarde vers Sheets via JSONP — un secteur à la fois pour rester sous la limite URL
async function saveToSheets() {
  try { localStorage.setItem('ra2026_saisie', JSON.stringify(state)); } catch(e) {}
  if (!SHEETS_ENABLED) { toast('Brouillon local sauvegardé ✓'); return; }

  const btn = document.querySelector('.btn-pdf');
  if (btn) { btn.textContent = '⏳ Envoi…'; btn.disabled = true; }

  try {
    const secteurs = state[currentJour] || [];
    let totalUpdated = 0, totalInserted = 0;

    // Sauvegarde secteur par secteur (évite la limite de longueur d'URL)
    for (const s of secteurs) {
      // 1. Lignes PS du secteur
      const jsonSaisie = await callAS({
        action: 'saveSaisie',
        jour: currentJour,
        data: JSON.stringify([s]), // un seul secteur à la fois
      });
      if (!jsonSaisie.ok) throw new Error(jsonSaisie.error);
      totalUpdated  += jsonSaisie.data.updated  || 0;
      totalInserted += jsonSaisie.data.inserted || 0;

      // 2. Commentaires du secteur
      if (s.commentaires && s.commentaires.some(Boolean)) {
        await callAS({
          action: 'saveCommentaires',
          jour: currentJour,
          secteur: s.secteur,
          data: JSON.stringify(s.commentaires),
        });
      }
    }

    toast(`Sheets mis à jour ✓  (${totalUpdated} modifiés, ${totalInserted} nouveaux)`);
  } catch(e) {
    toast('Erreur envoi Sheets — brouillon local conservé', 'err');
    console.error('Sheets save error:', e);
  } finally {
    if (btn) { btn.textContent = '💾 Sauvegarder'; btn.disabled = false; }
  }
}

// Bannière de chargement
function showLoadingBanner(msg) {
  let el = document.getElementById('loadingBanner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingBanner';
    el.style.cssText = `position:fixed;top:0;left:0;right:0;z-index:500;
      background:rgba(15,52,96,0.95);color:#fff;text-align:center;
      padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;
      letter-spacing:1px;border-bottom:2px solid #C0392B;`;
    document.body.prepend(el);
  }
  el.textContent = '⏳ ' + msg;
  el.style.display = 'block';
}
function hideLoadingBanner() {
  const el = document.getElementById('loadingBanner');
  if (el) el.style.display = 'none';
}

// ========================================================
// COURSES HELPERS
// ========================================================
function renderCoursePills(psStr, jourId) {
  const courses = getCoursesForPS(psStr, jourId);
  if (!courses.length) return '<span class="course-none">—</span>';
  return courses.map(name => {
    const c = COURSES[name];
    const bg = c ? c.couleur : '#555';
    return `<span class="course-pill" style="background:${bg}22;color:${bg};border:1px solid ${bg}55">${name}</span>`;
  }).join('');
}

function refreshCoursePills(si, ri, psVal) {
  const cell = document.getElementById(`course-${si}-${ri}`);
  if (cell) cell.innerHTML = renderCoursePills(psVal, currentJour);
}

function openCourses() {
  const body = document.getElementById('coursesPanelBody');
  body.innerHTML = '';

  // Stat: how many PS assigned per course this jour
  const sects = state[currentJour] || [];
  const assignedPS = new Set();
  sects.forEach(s => s.rows.forEach(r => { if (r.ps) assignedPS.add(r.ps); }));

  Object.entries(COURSES).forEach(([name, c]) => {
    const isActiveJour = c.jours.includes(currentJour);
    const jourBadges = JOURS.map(j =>
      `<span class="course-jour-badge ${c.jours.includes(j.id) && j.id === currentJour ? 'active-jour' : (c.jours.includes(j.id) ? '' : 'inactive')}"
        style="${c.jours.includes(j.id) ? '' : 'opacity:0.3'}">${j.label}</span>`
    ).join('');

    const psTags = c.ps.map(num => {
      // find matching PS string in PS_SECTEUR
      const allPS = Object.values(PS_SECTEUR).flat();
      const match = allPS.find(s => s.startsWith(num + ' ') || s.startsWith(num + '&') || s === String(num));
      const label = match || String(num);
      const isAssigned = [...assignedPS].some(s => {
        const nums = (s || '').match(/\d+/g);
        return nums && nums.map(Number).includes(num);
      });
      return `<span class="course-ps-item ${isAssigned ? 'assigned' : ''}">${label}</span>`;
    }).join('');

    const totalPS = c.ps.length;
    const coveredPS = c.ps.filter(num => {
      return [...assignedPS].some(s => {
        const nums = (s || '').match(/\d+/g);
        return nums && nums.map(Number).includes(num);
      });
    }).length;

    body.insertAdjacentHTML('beforeend', `
      <div class="course-card" style="border-color:${c.couleur}44">
        <div class="course-card-header" style="background:${c.couleur}22;color:${c.couleur}">
          <span>🏁 ${name}</span>
          <div class="course-jours">${jourBadges}</div>
        </div>
        <div class="course-ps-list">${psTags}</div>
        <div class="course-summary">
          ${isActiveJour
            ? `Couverture <strong>${currentJour}</strong> : <strong style="color:${coveredPS===totalPS?'var(--vert)':'var(--orange)'}">${coveredPS}/${totalPS} PS</strong> assignés`
            : `⚠ Cette course n'est pas active sur <strong>${currentJour}</strong>`
          }
        </div>
      </div>
    `);
  });

  document.getElementById('coursesOverlay').classList.add('active');
}

function closeCourses() {
  document.getElementById('coursesOverlay').classList.remove('active');
}

// ========================================================
// TOAST
// ========================================================
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type === 'warn' ? 'warn' : type === 'err' ? 'err' : ''}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ========================================================
// INIT
// ========================================================
initState();
loadDraft(); // fallback localStorage

// Charge depuis Sheets si URL configurée
loadReferentiels().then(() => {
  renderAll();
  loadSaisieFromSheets(currentJour);
});

// Quand on change de jour, recharge depuis Sheets
const _switchJourOrig = switchJour;
switchJour = function(jid) {
  currentJour = jid;
  renderAll();
  loadSaisieFromSheets(jid);
};
